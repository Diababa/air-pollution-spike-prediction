services:

  api:
    build:
      context: .
      dockerfile: Dockerfile.api

    container_name: air_pollution_api

    ports:
      - "8000:8000"

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard

    container_name: air_pollution_dashboard

    ports:
      - "8501:8501"

    depends_on:
      - api