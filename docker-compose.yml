services:
  api:
    build: .
    container_name: air_pollution_api
    command: python -m uvicorn src.api.app:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"

  dashboard:
    build: .
    container_name: air_pollution_dashboard
    command: streamlit run dashboard/app.py --server.address 0.0.0.0 --server.port 8501
    ports:
      - "8501:8501"
    depends_on:
      - api